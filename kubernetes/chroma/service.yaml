
apiVersion: v1
kind: Service
metadata:
  name: chroma-service    # DNS name: chroma-service.rag-system.svc.cluster.local
  namespace: rag-system   # Short form: chroma-service (within namespace)
spec:
  # ClusterIP: accessible only INSIDE the cluster (no external access)
  # WHY? ChromaDB should NOT be exposed to the internet.
  # Only the API pods should talk to it.
  type: ClusterIP
  
  selector:
    app: chroma    # Route traffic to pods with this label
  
  ports:
    - protocol: TCP
      port: 8000          # Port on the Service
      targetPort: 8000    # Port on the Pod